<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastroMetric | Global Food Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>GastroMetric</h1>
        <p>Global Culinary Intelligence Tracker</p>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by meal or ingredient...">
            <button id="searchBtn">Search</button>
        </div>
    </header>

    <main>
        <div id="loading" class="hidden">Fetching Global Data...</div>
        <div id="mealGrid" class="meal-grid">
            </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
